<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Quick Links & Preview</title>
    <style>
        body { 
            background: rgba(32, 33, 36, 0.9); 
            color: white; 
            font-family: sans-serif; 
            padding: 12px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 6px;
        }
        .action-btn {
            background: #2196F3;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 10px;
            text-transform: uppercase;
            transition: background 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .action-btn:hover { background: #1976D2; }

        .gm-editor {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
            display: none;
        }
        .link-row {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
        }
        input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 6px;
            font-size: 11px;
            border-radius: 3px;
        }
        .label-input { width: 80px; }
        .url-input { flex-grow: 1; }
        
        #previewContainer {
            margin-top: 10px;
            flex-grow: 1;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            background: #fdfdfd;
            height: 250px; /* Default height */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .preview-header {
            background: #333;
            color: #aaa;
            font-size: 9px;
            padding: 4px 8px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }
        #previewFrame {
            width: 100%;
            height: 100%;
            border: none;
        }
        .save-banner { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="buttonContainer" class="link-grid"></div>

    <div id="gmPanel" class="gm-editor">
        <div class="save-banner">Edit Links (Click label to preview)</div>
        <div id="inputContainer"></div>
        <button id="saveBtn" class="action-btn" style="width: 100%; margin-top: 8px; background: #4CAF50;">Save Room Links</button>
        
        <div id="previewContainer">
            <div class="preview-header">
                <span>Quick Preview</span>
                <span id="previewUrlDisplay">No site selected</span>
            </div>
            <iframe id="previewFrame" src="about:blank"></iframe>
        </div>
    </div>

<script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";

    const ID = "com.auldalliance.gm-links";
    const META_KEY = `${ID}/links`;

    OBR.onReady(async () => {
        const role = await OBR.player.getRole();
        const previewFrame = document.getElementById('previewFrame');
        const previewUrlDisplay = document.getElementById('previewUrlDisplay');

        if (role === "GM") document.getElementById('gmPanel').style.display = 'block';

        const updatePreview = (index) => {
            const urlValue = document.getElementById(`url-${index}`).value.trim();
            if (urlValue) {
                const formatted = urlValue.startsWith('http') ? urlValue : `https://${urlValue}`;
                previewFrame.src = formatted;
                previewUrlDisplay.innerText = urlValue;
            }
        };

        const setupInputs = () => {
            const container = document.getElementById('inputContainer');
            for (let i = 0; i < 5; i++) {
                const row = document.createElement('div');
                row.className = 'link-row';
                row.innerHTML = `
                    <input type="text" class="label-input" id="name-${i}" placeholder="Label ${i+1}">
                    <input type="text" class="url-input" id="url-${i}" placeholder="https://...">
                `;
                // Trigger preview when clicking the name field
                row.querySelector('.label-input').onclick = () => updatePreview(i);
                container.appendChild(row);
            }
        };

        const renderButtons = (links) => {
            const container = document.getElementById('buttonContainer');
            container.innerHTML = '';
            links.forEach(link => {
                if (link.url) {
                    const btn = document.createElement('button');
                    btn.className = 'action-btn';
                    btn.innerText = link.name || "Link";
                    btn.onclick = () => {
                        const formatted = link.url.startsWith('http') ? link.url : `https://${link.url}`;
                        window.open(formatted, '_blank', 'width=800,height=600');
                    };
                    container.appendChild(btn);
                }
            });
        };

        const loadData = async () => {
            const metadata = await OBR.room.getMetadata();
            const savedLinks = metadata[META_KEY] || [];
            if (role === "GM") {
                savedLinks.forEach((link, i) => {
                    if (i < 5) {
                        document.getElementById(`name-${i}`).value = link.name || '';
                        document.getElementById(`url-${i}`).value = link.url || '';
                    }
                });
            }
            renderButtons(savedLinks);
        };

        setupInputs();
        await loadData();

        document.getElementById('saveBtn').onclick = async () => {
            const links = [];
            for (let i = 0; i < 5; i++) {
                const name = document.getElementById(`name-${i}`).value;
                const url = document.getElementById(`url-${i}`).value;
                if (url) links.push({ name, url });
            }
            await OBR.room.setMetadata({ [META_KEY]: links });
            OBR.notification.show("Settings Saved");
        };

        OBR.room.onMetadataChange((meta) => {
            if (meta[META_KEY]) renderButtons(meta[META_KEY]);
        });
    });
</script>
</body>
</html>
