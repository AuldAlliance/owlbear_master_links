<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Quick Links</title>
    <style>
        body { 
            background: rgba(32, 33, 36, 0.9); 
            color: white; 
            font-family: sans-serif; 
            padding: 15px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }
        .action-btn {
            background: #2196F3;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 11px;
            transition: background 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .action-btn:hover { background: #1976D2; }
        .action-btn:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }

        .gm-editor {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
            display: none; /* Hidden by default for players */
        }
        .link-row {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }
        input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 6px;
            font-size: 11px;
            border-radius: 3px;
            flex: 1;
        }
        .label-input { flex: 0 0 80px; }
        .save-banner { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="buttonContainer" class="link-grid">
        </div>

    <div id="gmPanel" class="gm-editor">
        <div class="save-banner">Edit GM Links (Names & URLs)</div>
        <div id="inputContainer">
            </div>
        <button id="saveBtn" class="action-btn" style="width: 100%; margin-top: 5px; background: #4CAF50;">Save Settings</button>
    </div>

<script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";

    const ID = "com.auldalliance.gm-links";
    const META_KEY = `${ID}/links`;

    OBR.onReady(async () => {
        const role = await OBR.player.getRole();
        if (role === "GM") document.getElementById('gmPanel').style.display = 'block';

        // Initialize 5 empty slots
        const setupInputs = () => {
            const container = document.getElementById('inputContainer');
            for (let i = 0; i < 5; i++) {
                const row = document.createElement('div');
                row.className = 'link-row';
                row.innerHTML = `
                    <input type="text" class="label-input" id="name-${i}" placeholder="Label ${i+1}">
                    <input type="text" class="url-input" id="url-${i}" placeholder="https://...">
                `;
                container.appendChild(row);
            }
        };

        const renderButtons = (links) => {
            const container = document.getElementById('buttonContainer');
            container.innerHTML = '';
            links.forEach(link => {
                if (link.url) {
                    const btn = document.createElement('button');
                    btn.className = 'action-btn';
                    btn.innerText = link.name || "Link";
                    btn.onclick = () => {
                        const formatted = link.url.startsWith('http') ? link.url : `https://${link.url}`;
                        window.open(formatted, '_blank', 'width=800,height=600');
                    };
                    container.appendChild(btn);
                }
            });
            // If no links, show placeholder
            if (container.innerHTML === '') {
                container.innerHTML = '<div style="font-size:11px; color:#666; grid-column: 1/-1;">No GM links defined.</div>';
            }
        };

        const loadData = async () => {
            const metadata = await OBR.room.getMetadata();
            const savedLinks = metadata[META_KEY] || [];
            
            // Fill inputs if GM
            if (role === "GM") {
                savedLinks.forEach((link, i) => {
                    if (i < 5) {
                        document.getElementById(`name-${i}`).value = link.name || '';
                        document.getElementById(`url-${i}`).value = link.url || '';
                    }
                });
            }
            renderButtons(savedLinks);
        };

        const saveData = async () => {
            const links = [];
            for (let i = 0; i < 5; i++) {
                const name = document.getElementById(`name-${i}`).value;
                const url = document.getElementById(`url-${i}`).value;
                if (url) links.push({ name, url });
            }
            await OBR.room.setMetadata({ [META_KEY]: links });
            OBR.notification.show("Links updated!");
        };

        setupInputs();
        await loadData();

        document.getElementById('saveBtn').onclick = saveData;

        // Listen for changes from other GM sessions
        OBR.room.onMetadataChange((meta) => {
            if (meta[META_KEY]) renderButtons(meta[META_KEY]);
        });
    });
</script>
</body>
</html>
