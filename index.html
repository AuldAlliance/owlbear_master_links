<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Dashboard 10-Link</title>
    <style>
        :root {
            --primary: #2196F3;
            --bg: transparent; 
            --panel: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --active-green: #2e7d32;
        }
        body { 
            background: transparent; 
            color: #eee; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            padding: 4px; 
            margin: 0;
            overflow: hidden; 
        }
        .container {
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }
        
        .link-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, auto);
            gap: 6px;
            margin-bottom: 4px;
        }

        .action-btn {
            background: var(--panel);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 2px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Highlighting for populated buttons */
        .action-btn.active {
            background: var(--active-green);
            border-color: #4caf50;
            opacity: 1;
        }
        .action-btn.active:hover {
            background: #388e3c;
            transform: translateY(-1px);
        }

        /* Styling for empty buttons */
        .action-btn:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.2);
            cursor: default;
        }

        .editor-toggle {
            display: flex;
            justify-content: flex-end;
            margin-top: 2px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            padding: 4px;
        }
        .icon-btn:hover { color: white; }

        #gmPanel {
            display: none;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-top: 8px;
            padding: 10px;
            border: 1px solid var(--border);
        }

        .row {
            display: flex;
            gap: 4px;
            margin-bottom: 5px;
        }

        input {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: white;
            padding: 5px;
            font-size: 11px;
            border-radius: 4px;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
        .label-in { width: 70px; }
        .url-in { flex-grow: 1; }
        .section-label { font-size: 9px; color: #aaa; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;}
    </style>
</head>
<body>

<div class="container">
    <div id="buttonContainer" class="link-grid"></div>

    <div id="gmOnly" style="display:none;">
        <div class="editor-toggle">
            <button class="icon-btn" id="toggleSettings" title="Configure 10 Links">
                <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.17.31a1.464 1.464 0 0 1-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.31-.17a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.17-.31a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.31.17a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/></svg>
            </button>
        </div>

        <div id="gmPanel">
            <div class="section-label">Link Settings (1-10)</div>
            <div id="inputList"></div>
        </div>
    </div>
</div>

<script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";

    const ID = "com.auldalliance.gm-links";
    const META_KEY = `${ID}/links`;

    OBR.onReady(async () => {
        const role = await OBR.player.getRole();
        
        if (role === "GM") {
            document.getElementById('gmOnly').style.display = 'block';
            await OBR.action.setHeight(110); // Slightly taller for two rows
        } else {
            await OBR.action.setHeight(80);
        }

        const setupInputs = () => {
            const list = document.getElementById('inputList');
            for (let i = 0; i < 10; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `
                    <input type="text" class="label-in" id="n-${i}" placeholder="Label">
                    <input type="text" class="url-in" id="u-${i}" placeholder="URL">
                `;
                row.querySelectorAll('input').forEach(el => el.oninput = () => saveData());
                list.appendChild(row);
            }
        };

        const renderButtons = (links) => {
            const container = document.getElementById('buttonContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < 10; i++) {
                const link = links[i] || {};
                const btn = document.createElement('button');
                btn.className = 'action-btn';
                
                if (link.url && link.url.trim() !== "") {
                    btn.classList.add('active');
                    btn.innerText = link.name || `Link ${i + 1}`;
                    btn.title = link.url;
                    btn.onclick = () => {
                        const url = link.url.startsWith('http') ? link.url : `https://${link.url}`;
                        window.open(url, '_blank', 'width=800,height=600');
                    };
                } else {
                    btn.innerText = "—"; // Minimal indicator for empty
                }
                container.appendChild(btn);
            }
        };

        const saveData = async () => {
            const links = [];
            for (let i = 0; i < 10; i++) {
                const name = document.getElementById(`n-${i}`).value;
                const url = document.getElementById(`u-${i}`).value;
                links.push({ name, url }); // Push empty ones too to preserve order
            }
            await OBR.room.setMetadata({ [META_KEY]: links });
        };

        const loadData = async () => {
            const meta = await OBR.room.getMetadata();
            const links = meta[META_KEY] || [];
            if (role === "GM") {
                links.forEach((l, i) => {
                    if (i < 10) {
                        const nEl = document.getElementById(`n-${i}`);
                        const uEl = document.getElementById(`u-${i}`);
                        if(nEl) nEl.value = l.name || '';
                        if(uEl) uEl.value = l.url || '';
                    }
                });
            }
            renderButtons(links);
        };

        document.getElementById('toggleSettings').onclick = async () => {
            const panel = document.getElementById('gmPanel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
                await OBR.action.setHeight(110); 
            } else {
                panel.style.display = 'block';
                await OBR.action.setHeight(480); 
            }
        };

        setupInputs();
        await loadData();
        OBR.room.onMetadataChange((meta) => { 
            if (meta[META_KEY]) renderButtons(meta[META_KEY]); 
        });
    });
</script>
</body>
</html>
