<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM Dashboard</title>
    <style>
        :root {
            --primary: #2196F3;
            --bg: rgba(30, 31, 34, 0.95);
            --panel: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { 
            background: transparent; 
            color: #eee; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            padding: 10px; 
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        /* Dashboard Grid */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 8px;
            margin-bottom: 8px;
        }
        .action-btn {
            background: var(--panel);
            border: 1px solid var(--border);
            color: white;
            padding: 12px 6px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .action-btn:hover {
            background: var(--primary);
            border-color: #64b5f6;
            transform: translateY(-1px);
        }
        /* GM Editor Toggle */
        .editor-toggle {
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
        }
        .icon-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 4px;
        }
        .icon-btn:hover { color: white; }

        /* Settings Panel */
        #gmPanel {
            display: none;
            border-top: 1px solid var(--border);
            margin-top: 10px;
            padding-top: 10px;
        }
        .row {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
        }
        input {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: white;
            padding: 6px;
            font-size: 11px;
            border-radius: 4px;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
        .label-in { width: 70px; }
        .url-in { flex-grow: 1; }
        .section-label { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;}
    </style>
</head>
<body>

<div class="container">
    <div id="buttonContainer" class="link-grid">
        </div>

    <div id="gmOnly" style="display:none;">
        <div class="editor-toggle">
            <button class="icon-btn" id="toggleSettings" title="Configure Links">
                <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.17.31a1.464 1.464 0 0 1-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.31-.17a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.17-.31a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.31.17a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/></svg>
            </button>
        </div>

        <div id="gmPanel">
            <div class="section-label">Link Settings (Auto-Saves)</div>
            <div id="inputList"></div>
        </div>
    </div>
</div>

<script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";

    const ID = "com.auldalliance.gm-links";
    const META_KEY = `${ID}/links`;

    OBR.onReady(async () => {
        const role = await OBR.player.getRole();
        if (role === "GM") document.getElementById('gmOnly').style.display = 'block';

        const setupInputs = () => {
            const list = document.getElementById('inputList');
            for (let i = 0; i < 5; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `
                    <input type="text" class="label-in" id="n-${i}" placeholder="Name">
                    <input type="text" class="url-in" id="u-${i}" placeholder="URL">
                `;
                row.querySelectorAll('input').forEach(el => el.oninput = () => saveData());
                list.appendChild(row);
            }
        };

        const renderButtons = (links) => {
            const container = document.getElementById('buttonContainer');
            container.innerHTML = '';
            links.forEach(link => {
                if (link.url) {
                    const btn = document.createElement('button');
                    btn.className = 'action-btn';
                    btn.innerText = link.name || "Open";
                    btn.onclick = () => {
                        const url = link.url.startsWith('http') ? link.url : `https://${link.url}`;
                        window.open(url, '_blank', 'width=800,height=600');
                    };
                    container.appendChild(btn);
                }
            });
        };

        const saveData = async () => {
            const links = [];
            for (let i = 0; i < 5; i++) {
                const name = document.getElementById(`n-${i}`).value;
                const url = document.getElementById(`u-${i}`).value;
                if (url) links.push({ name, url });
            }
            await OBR.room.setMetadata({ [META_KEY]: links });
        };

        const loadData = async () => {
            const meta = await OBR.room.getMetadata();
            const links = meta[META_KEY] || [];
            if (role === "GM") {
                links.forEach((l, i) => {
                    if (i < 5) {
                        document.getElementById(`n-${i}`).value = l.name || '';
                        document.getElementById(`u-${i}`).value = l.url || '';
                    }
                });
            }
            renderButtons(links);
        };

        document.getElementById('toggleSettings').onclick = () => {
            const panel = document.getElementById('gmPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        };

        setupInputs();
        await loadData();
        OBR.room.onMetadataChange((meta) => { if (meta[META_KEY]) renderButtons(meta[META_KEY]); });
    });
</script>
</body>
</html>
